<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>행운의 로또 번호 생성기</title>
    <style>
        /* 기본 배경 및 폰트 설정 */
        body {
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* 메인 컨테이너 디자인 */
        .container {
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        h1 {
            color: #333;
            font-size: 26px;
            margin-bottom: 25px;
        }

        /* 버튼 디자인 */
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
            margin-bottom: 30px;
        }

        button:hover {
            background-color: #45a049;
        }

        button:active {
            transform: scale(0.98);
        }

        /* 게임 결과 한 줄(row) 배치 */
        .game-row {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            gap: 12px;
        }

        /* 게임 숫자 라벨 (예: 게임 1) */
        .game-label {
            font-weight: bold;
            color: #666;
            width: 60px;
            text-align: right;
            margin-right: 5px;
        }

        /* 로또 공 디자인 */
        .ball {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
            box-shadow: inset -3px -3px 6px rgba(0, 0, 0, 0.2), 
                        2px 2px 5px rgba(0, 0, 0, 0.1);
        }

        /* 실제 로또 번호대별 색상 지정 */
        .color-1 { background-color: #fbc400; } /* 1~10: 노랑 */
        .color-2 { background-color: #69c8f2; } /* 11~20: 파랑 */
        .color-3 { background-color: #ff7272; } /* 21~30: 빨강 */
        .color-4 { background-color: #aaaaaa; } /* 31~40: 회색 */
        .color-5 { background-color: #b0d840; } /* 41~45: 초록 */
    </style>
</head>
<body>

    <div class="container">
        <h1>🎉 행운의 로또 번호 생성기 🎉</h1>
        <button id="generate-btn">5게임 생성하기</button>
        <div id="result-container">
            <!-- 번호가 여기에 생성됩니다 -->
        </div>
    </div>

    <script>
        // 버튼 클릭 이벤트 리스너 등록
        document.getElementById('generate-btn').addEventListener('click', generateLottoNumbers);

        // 로또 번호 생성 메인 함수
        function generateLottoNumbers() {
            const resultContainer = document.getElementById('result-container');
            resultContainer.innerHTML = ''; // 기존 결과 초기화

            // 5게임 반복
            for (let i = 1; i <= 5; i++) {
                const numbers = getUniqueRandomNumbers();
                
                // 한 게임을 담을 묶음(div) 생성
                const gameRow = document.createElement('div');
                gameRow.className = 'game-row';
                
                // '게임 1', '게임 2' 라벨 생성
                const label = document.createElement('div');
                label.className = 'game-label';
                label.textContent = `게임 ${i}`;
                gameRow.appendChild(label);

                // 6개의 번호를 각각 공(div)으로 만들어 추가
                numbers.forEach(num => {
                    const ball = document.createElement('div');
                    ball.className = `ball ${getColorClass(num)}`;
                    ball.textContent = num;
                    gameRow.appendChild(ball);
                });

                // 결과 컨테이너에 현재 게임 추가
                resultContainer.appendChild(gameRow);
            }
        }

        // 1~45 사이의 중복 없는 숫자 6개 추출 및 정렬
        function getUniqueRandomNumbers() {
            const numbers = new Set();
            // Set의 크기가 6이 될 때까지 무작위 숫자 추가 (중복 자동 제거)
            while(numbers.size < 6) {
                numbers.add(Math.floor(Math.random() * 45) + 1);
            }
            // 배열로 변환 후 오름차순 정렬
            return Array.from(numbers).sort((a, b) => a - b);
        }

        // 숫자에 따른 공 색상 클래스 반환
        function getColorClass(num) {
            if (num <= 10) return 'color-1';
            if (num <= 20) return 'color-2';
            if (num <= 30) return 'color-3';
            if (num <= 40) return 'color-4';
            return 'color-5';
        }
    </script>
</body>
</html>
